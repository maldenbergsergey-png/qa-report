<svg width="114" height="112" viewBox="0 0 114 112" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="QA">
  <defs>
    <linearGradient id="qa-bg" x1="0" y1="0" x2="114" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff2730"/>
      <stop offset="0.58" stop-color="#c5161d"/>
      <stop offset="1" stop-color="#b40070"/>
    </linearGradient>
    <linearGradient id="qa-shine" x1="-50" y1="0" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
      <animate attributeName="x1" values="-70;130" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-20;180" dur="3.2s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="qa-soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#6d0007" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect width="114" height="112" rx="22" fill="url(#qa-bg)"/>
  <rect width="114" height="112" rx="22" fill="url(#qa-shine)" opacity="0.72"/>
  <g filter="url(#qa-soft-shadow)">
    <text x="57" y="67" text-anchor="middle"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="38"
      font-weight="900"
      letter-spacing="-4"
      fill="#ffffff">QA</text>
    <path d="M72.5 70.5 82 80" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round">
      <animate attributeName="opacity" values="0.72;1;0.72" dur="1.8s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
